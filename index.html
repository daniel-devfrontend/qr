<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página de la araña</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f3f3;
      color: #111;
    }
    .card {
      max-width: 900px;
      width: 100%;
      padding: 32px;
      text-align: center;
      background: #ffffff;
      border-radius: 32px;
      box-shadow: 0 28px 60px rgba(0, 0, 0, 0.12);
    }
    h1 {
      margin: 0 0 20px;
      font-size: 2.2rem;
      line-height: 1.1;
    }
    .image-frame {
      display: inline-block;
      padding: 20px;
      border-radius: 30px;
      background: #000;
    }
    .image-frame img {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 24px;
    }
    .caption {
      margin: 20px 0 0;
      color: #555;
      font-size: 1rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Página con la imagen de la araña</h1>
    <div class="image-frame">
      <img src="spider.svg" alt="Araña con telaraña">
    </div>
    <p class="caption">Esta página muestra la imagen de la araña en un formato web. Puedes subir este contenido a GitHub en un repositorio estático.</p>
  </div>
</body>
</html>
